{% extends 'base.html' %}
{% block title %}Add Product - Dashboard{% endblock %}
{% block extra_css %}
<style>
    .form-card {
        background: white;
        border-radius: 10px;
        padding: 40px;
        box-shadow: 0 2px 12px rgba(0,0,0,.08);
        border: 1px solid #f0f0f0;
        max-width: 700px;
        margin: 0 auto;
    }
    .form-card label { font-size: 0.95rem; font-weight: 600; margin-bottom: 6px; }
    .form-card input[type="text"],
    .form-card input[type="number"],
    .form-card input[type="file"],
    .form-card textarea {
        border-radius: 8px;
        padding: 12px 14px;
        border: 1px solid #ddd;
        font-size: 1rem;
        transition: border-color .2s;
    }
    .form-card input:focus, .form-card textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(255,111,0,.12);
    }
    .pricing-row {
        display: flex;
        gap: 12px;
        align-items: flex-end;
        margin-bottom: 10px;
    }
    .pricing-row .form-group { flex: 1; margin-bottom: 0; }
    .pricing-row .btn { margin-bottom: 2px; }
</style>
{% endblock %}
{% block content %}
<div class="container my-5">
    <div class="form-card">
        <h4 style="font-size:1.4rem;font-weight:700;margin-bottom:24px">
            <i class="fas fa-plus-circle me-2" style="color:var(--primary)"></i>Add New Product
        </h4>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="mb-3">
                <label>SKU *</label>
                <input type="text" name="sku" class="form-control" required placeholder="e.g. SKU001">
            </div>
            <div class="mb-3">
                <label>Description *</label>
                <textarea name="description" class="form-control" rows="4" required placeholder="Product description..."></textarea>
            </div>
            <div class="mb-3">
                <label>Image *</label>
                <input type="file" name="image" class="form-control" accept="image/*" required>
            </div>
            <div class="mb-4">
                <label class="mb-2">Pricing (MOQ & Price)</label>
                <div id="pricingContainer">
                    <div class="pricing-row">
                        <div class="form-group">
                            <input type="number" name="pricing_moqs[]" class="form-control" min="1" placeholder="MOQ (e.g. 10)" required>
                        </div>
                        <div class="form-group">
                            <input type="number" name="pricing_prices[]" class="form-control" min="1" placeholder="Price per unit (Rs.)" required>
                        </div>
                        <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>
                <button type="button" class="btn btn-outline-success btn-sm mt-2" onclick="addPricingRow()">
                    <i class="fas fa-plus me-1"></i>Add Row
                </button>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" style="font-size:1rem;padding:10px 28px">
                    <i class="fas fa-plus me-1"></i>Add Product
                </button>
                <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary" style="font-size:1rem">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script>
function addPricingRow() {
    const container = document.getElementById('pricingContainer');
    const row = document.createElement('div');
    row.className = 'pricing-row';
    row.innerHTML = `
        <div class="form-group">
            <input type="number" name="pricing_moqs[]" class="form-control" min="1" placeholder="MOQ (e.g. 10)" required>
        </div>
        <div class="form-group">
            <input type="number" name="pricing_prices[]" class="form-control" min="1" placeholder="Price per unit (Rs.)" required>
        </div>
        <button type="button" class="btn btn-outline-danger btn-sm" onclick="this.parentElement.remove()">
            <i class="fas fa-times"></i>
        </button>
    `;
    container.appendChild(row);
}
</script>
{% endblock %}
